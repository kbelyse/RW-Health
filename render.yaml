# Render Blueprint — correct start command runs `prisma db push` before the API.
# If you already created the service manually, set the same Build / Start in the dashboard (see README).
services:
  - type: web
    name: rw-health
    runtime: node
    buildCommand: npm run build:render
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    # Root directory = repo root (default). In dashboard: set Health Check Path to /api/health if not using Blueprint.
